<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>天涯神贴 — 后台管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a2e;--card:#16213e;--accent:#e2b14c;--text:#e0e0e0;--muted:#888;--border:#2a2a4a;--danger:#e74c3c;--success:#2ecc71}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
h1{text-align:center;padding:24px 0 8px;font-size:1.6rem;color:var(--accent);letter-spacing:.1em}
.subtitle{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:24px}
.container{max-width:960px;margin:0 auto;padding:0 16px 48px}
/* Form */
.form-card{background:var(--card);border-radius:12px;padding:24px;margin-bottom:24px;border:1px solid var(--border)}
.form-card h2{font-size:1.1rem;margin-bottom:16px;color:var(--accent)}
.field{margin-bottom:14px}
.field label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#0f0f23;color:var(--text);font-size:.9rem}
.field textarea{resize:vertical;min-height:80px}
.field input[type=file]{padding:8px}
.row{display:flex;gap:12px}
.row .field{flex:1}
.check-label{display:flex;align-items:center;gap:8px;font-size:.9rem;cursor:pointer}
.check-label input{width:18px;height:18px;accent-color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:8px;font-size:.9rem;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#1a1a2e;font-weight:600}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{border-color:var(--accent)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:.85}
.btn-sm{padding:6px 12px;font-size:.8rem}
.actions{display:flex;gap:8px;margin-top:8px}
/* Table */
.table-card{background:var(--card);border-radius:12px;padding:24px;border:1px solid var(--border)}
.table-card h2{font-size:1.1rem;margin-bottom:16px;color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:10px 8px;border-bottom:2px solid var(--border);color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-size:.75rem}
td{padding:10px 8px;border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(226,177,76,.04)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;background:rgba(226,177,76,.15);color:var(--accent)}
.badge-featured{background:rgba(226,177,76,.3)}
.pdf-link{color:var(--accent);font-size:.8rem}
.color-dot{display:inline-block;width:14px;height:14px;border-radius:50%;vertical-align:middle;margin-right:4px}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-size:.85rem;z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast-success{background:var(--success)}
.toast-error{background:var(--danger)}
.empty{text-align:center;padding:40px;color:var(--muted)}
@media(max-width:640px){.row{flex-direction:column}.table-card{overflow-x:auto}}
</style>
</head>
<body>
<h1>📜 天涯神贴 · 后台管理</h1>
<p class="subtitle">管理帖子 & 上传 PDF 素材</p>

<div class="container">
  <!-- Form -->
  <div class="form-card" id="formCard">
    <h2 id="formTitle">✏️ 新建帖子</h2>
    <form id="postForm" enctype="multipart/form-data">
      <input type="hidden" id="editId" />
      <div class="row">
        <div class="field">
          <label>标题 *</label>
          <input type="text" id="fTitle" required placeholder="帖子标题" />
        </div>
        <div class="field" style="max-width:160px">
          <label>作者</label>
          <input type="text" id="fAuthor" value="佚名" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>分类</label>
          <select id="fCategory"></select>
        </div>
        <div class="field" style="max-width:140px">
          <label>封面色</label>
          <input type="color" id="fColor" value="#d4a574" />
        </div>
      </div>
      <div class="field">
        <label>简介</label>
        <textarea id="fDesc" placeholder="帖子简介…"></textarea>
      </div>
      <div class="field">
        <label>PDF 文件</label>
        <input type="file" id="fPdf" accept=".pdf" />
        <span id="currentPdf" style="font-size:.8rem;color:var(--muted)"></span>
      </div>
      <label class="check-label">
        <input type="checkbox" id="fFeatured" />
        设为精选（首页推荐）
      </label>
      <div class="actions">
        <button type="submit" class="btn btn-primary" id="submitBtn">创建帖子</button>
        <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none" onclick="resetForm()">取消编辑</button>
      </div>
    </form>
  </div>

  <!-- List -->
  <div class="table-card">
    <h2>📋 帖子列表</h2>
    <table>
      <thead>
        <tr>
          <th>标题</th>
          <th>分类</th>
          <th>作者</th>
          <th>浏览</th>
          <th>PDF</th>
          <th>精选</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="emptyMsg" class="empty" style="display:none">暂无帖子，请先创建 ↑</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = window.location.origin;

async function loadCategories() {
  const cats = await fetch(`${API}/api/categories`).then(r => r.json());
  const sel = document.getElementById('fCategory');
  sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

async function loadPosts() {
  const posts = await fetch(`${API}/api/posts`).then(r => r.json());
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('emptyMsg');
  if (!posts.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  tbody.innerHTML = posts.map(p => `
    <tr>
      <td><span class="color-dot" style="background:${esc(p.cover_color)}"></span>${esc(p.title)}</td>
      <td><span class="badge">${esc(p.category)}</span></td>
      <td>${esc(p.author)}</td>
      <td>${p.view_count.toLocaleString()}</td>
      <td>${p.pdf_file ? `<a href="${API}/uploads/${esc(p.pdf_file)}" target="_blank" class="pdf-link">📄 查看</a>` : '—'}</td>
      <td>${p.is_featured ? '<span class="badge badge-featured">⭐ 精选</span>' : ''}</td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick='editPost(${JSON.stringify(p)})'>编辑</button>
        <button class="btn btn-danger btn-sm" onclick="deletePost('${p.id}')">删除</button>
      </td>
    </tr>
  `).join('');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast toast-${type} show`;
  setTimeout(() => t.className = 'toast', 2500);
}

function resetForm() {
  document.getElementById('editId').value = '';
  document.getElementById('postForm').reset();
  document.getElementById('fColor').value = '#d4a574';
  document.getElementById('formTitle').textContent = '✏️ 新建帖子';
  document.getElementById('submitBtn').textContent = '创建帖子';
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('currentPdf').textContent = '';
}

function editPost(p) {
  document.getElementById('editId').value = p.id;
  document.getElementById('fTitle').value = p.title;
  document.getElementById('fAuthor').value = p.author;
  document.getElementById('fCategory').value = p.category;
  document.getElementById('fColor').value = p.cover_color;
  document.getElementById('fDesc').value = p.description;
  document.getElementById('fFeatured').checked = !!p.is_featured;
  document.getElementById('formTitle').textContent = '✏️ 编辑帖子';
  document.getElementById('submitBtn').textContent = '更新帖子';
  document.getElementById('cancelBtn').style.display = '';
  document.getElementById('currentPdf').textContent = p.pdf_file ? `当前: ${p.pdf_file}` : '';
  document.getElementById('fPdf').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deletePost(id) {
  if (!confirm('确定删除该帖子？')) return;
  await fetch(`${API}/api/admin/posts/${id}`, { method: 'DELETE' });
  toast('已删除');
  loadPosts();
}

document.getElementById('postForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData();
  const editId = document.getElementById('editId').value;
  if (editId) fd.append('id', editId);
  fd.append('title', document.getElementById('fTitle').value);
  fd.append('author', document.getElementById('fAuthor').value);
  fd.append('category', document.getElementById('fCategory').value);
  fd.append('description', document.getElementById('fDesc').value);
  fd.append('cover_color', document.getElementById('fColor').value);
  fd.append('is_featured', document.getElementById('fFeatured').checked ? '1' : '0');
  const pdfFile = document.getElementById('fPdf').files[0];
  if (pdfFile) fd.append('pdf', pdfFile);
  try {
    const res = await fetch(`${API}/api/admin/posts`, { method: 'POST', body: fd });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Error'); }
    toast(editId ? '已更新' : '已创建');
    resetForm();
    loadPosts();
  } catch (err) { toast(err.message, 'error'); }
});

loadCategories();
loadPosts();
</script>
</body>
</html>
